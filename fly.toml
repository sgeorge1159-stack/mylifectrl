# fly.toml app configuration file generated for mylifectrl on 2026-07-21T13:58:41Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mylifectrl'
primary_region = 'iad'

[build]
  dockerfile = 'server/Dockerfile'

[[mounts]]
  source = 'data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
